name: CI/CD + OWASP Security Scan

on:
  push:
    branches: [ main ]

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
    # -----------------------------
    # 1. Checkout
    # -----------------------------
    - name: Checkout Repository
      uses: actions/checkout@v4

    # -----------------------------
    # 2. Node Setup
    # -----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # -----------------------------
    # 3. Install Dependencies
    # -----------------------------
    - name: Install Dependencies
      run: npm install

    - name: Generate package-lock.json
      run: npm install --package-lock-only

    # -----------------------------
    # 4. Build
    # -----------------------------
    - name: Build Application
      run: npm run build

    # -----------------------------
    # 5. OWASP Scan
    # -----------------------------
    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "js-webapp"
        path: "."
        format: "JSON"
        out: "reports"

    # -----------------------------
    # FIX PERMISSIONS
    # -----------------------------
    - name: Fix permissions
      run: |
        mkdir -p reports
        chmod -R 777 reports

    # -----------------------------
    # 6. Generate HTML Report
    # -----------------------------
    - name: Generate HTML Report
      run: python3 scripts/owasp_report.py

    # -----------------------------
    # 7. Fail on Critical
    # -----------------------------
    - name: Fail on Critical Vulnerabilities
      run: |
        if grep -q "Critical" reports/final-report.html; then
          echo "❌ Critical vulnerabilities found!"
          exit 1
        fi

    # -----------------------------
    # 8. Upload HTML Report
    # -----------------------------
    - name: Upload HTML Report
      uses: actions/upload-artifact@v4
      with:
        name: owasp-html-report
        path: reports/final-report.html

    # -----------------------------
    # 9. Deploy to EC2
    # -----------------------------
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: devops
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 2222
        script: |
          cd /home/devops/js-webapp
          git pull origin main

          export NVM_DIR="$HOME/.nvm"
          source $NVM_DIR/nvm.sh

          npm install
          npm run build

          pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start
