name: Full DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # -----------------------------
    # 1. Checkout
    # -----------------------------
    - name: Checkout Code
      uses: actions/checkout@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # -----------------------------
    # 2. Setup Node
    # -----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # -----------------------------
    # 3. Install Dependencies
    # -----------------------------
    - name: Install Dependencies
      run: npm install

    - name: Generate Lock File
      run: npm install --package-lock-only

    # -----------------------------
    # 4. NPM Audit Gate
    # Fail fast on critical/high vulnerabilities
    # before wasting time on build + scan.
    # Remove --audit-level=high to only block on critical.
    # -----------------------------
    - name: NPM Audit — Fail on Critical Only
      run: npm audit --audit-level=critical

    # -----------------------------
    # 5. Build App
    # -----------------------------
    - name: Build Application
      run: npm run build

    # -----------------------------
    # 6. OWASP Dependency Scan
    # -----------------------------
    - name: Run OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: "js-webapp"
        path: "."
        format: "JSON"
        out: "reports"

    # -----------------------------
    # 7. Fix Docker Permission Issue
    # -----------------------------
    - name: Prepare Writable Reports
      run: |
        mkdir -p writable-reports
        cp reports/dependency-check-report.json writable-reports/

    # -----------------------------
    # 8. Generate HTML Report
    # -----------------------------
    - name: Generate HTML Report
      run: python3 scripts/owasp_report.py

    # -----------------------------
    # 9. Fail on Critical (OWASP)
    # -----------------------------
    - name: Fail if Critical Vulnerabilities Found
      run: |
        if grep -q "Critical" writable-reports/final-report.html; then
          echo "❌ Critical vulnerabilities found in OWASP report!"
          exit 1
        fi

    # -----------------------------
    # 10. Upload Report
    # Always upload even if previous steps failed,
    # so the report is available for investigation.
    # -----------------------------
    - name: Upload HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: owasp-report
        path: writable-reports/final-report.html
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # -----------------------------
    # 11. SERVER SETUP + DEPLOY
    # -----------------------------
    - name: Provision Server & Deploy App
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          set -e

          USERNAME="devops"
          APP_DIR="/home/devops/js-webapp"

          # -----------------------------
          # USER SETUP
          # -----------------------------
          if ! id "$USERNAME" &>/dev/null; then
            sudo adduser --disabled-password --gecos "" $USERNAME
          fi
          sudo usermod -aG sudo $USERNAME

          # -----------------------------
          # SSH HARDENING
          # -----------------------------
          sudo sed -i 's/^#\?PermitRootLogin .*/PermitRootLogin no/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?PasswordAuthentication .*/PasswordAuthentication no/' /etc/ssh/sshd_config
          sudo sed -i 's/^#\?Port .*/Port 2222/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          # -----------------------------
          # FIREWALL
          # -----------------------------
          sudo ufw allow 2222/tcp
          sudo ufw allow 80/tcp
          sudo ufw allow 443/tcp
          sudo ufw --force enable

          # -----------------------------
          # INSTALL PACKAGES
          # -----------------------------
          sudo apt update -y
          sudo apt install -y nginx git curl certbot python3-certbot-nginx

          # -----------------------------
          # NODE + PM2 (DEVOPS USER)
          # -----------------------------
          sudo -u devops bash << 'EOF'
          export NVM_DIR="$HOME/.nvm"

          if [ ! -d "$NVM_DIR" ]; then
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh | bash
          fi

          source "$NVM_DIR/nvm.sh"

          nvm install 20
          nvm use 20
          nvm alias default 20

          npm install -g pm2

          echo 'export NVM_DIR="$HOME/.nvm"' >> ~/.bashrc
          echo '[ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"' >> ~/.bashrc
          EOF

          # -----------------------------
          # DEPLOY APP
          # -----------------------------
          sudo -u devops bash << EOF
          export NVM_DIR="/home/devops/.nvm"
          source "\$NVM_DIR/nvm.sh"

          cd ~

          if [ ! -d "$APP_DIR" ]; then
            git clone https://github.com/marandiwakar-lang/js-webapp.git $APP_DIR
          fi

          cd $APP_DIR
          git pull origin main

          npm install
          npm run build

          # Gracefully restart if running, otherwise start fresh.
          # Avoids the PM2 ERROR on first-time deploy.
          if pm2 describe nextjs-app > /dev/null 2>&1; then
            pm2 restart nextjs-app --update-env
          else
            pm2 start npm --name "nextjs-app" -- start
          fi

          pm2 save
          EOF

          # -----------------------------
          # PM2 STARTUP (REBOOT PERSISTENCE)
          # Generates the systemd unit and immediately
          # executes it so the app survives server reboots.
          # -----------------------------
          STARTUP_CMD=$(sudo -u devops bash -c "
            export NVM_DIR='/home/devops/.nvm'
            source \$NVM_DIR/nvm.sh
            pm2 startup systemd -u devops --hp /home/devops
          " 2>&1 | grep 'sudo env PATH')

          if [ -n "$STARTUP_CMD" ]; then
            eval "$STARTUP_CMD"
            echo "✅ PM2 startup systemd unit registered."
          else
            echo "ℹ️ PM2 startup command not found — may already be registered."
          fi

          # -----------------------------
          # NGINX CONFIG
          # -----------------------------
          sudo tee /etc/nginx/sites-available/default > /dev/null << 'NGINXEOF'
          server {
              listen 80;
              server_name _;

              add_header X-Frame-Options "DENY";
              add_header X-Content-Type-Options "nosniff";

              location ~ /\.git {
                  deny all;
                  return 404;
              }

              location ~ /\.env {
                  deny all;
                  return 404;
              }

              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
          NGINXEOF

          sudo nginx -t
          sudo systemctl restart nginx

          # -----------------------------
          # ENABLE HTTPS
          # -----------------------------
          sudo certbot --nginx --non-interactive --agree-tos \
            -m marandiwakar@gmail.com \
            -d myjavascriptapp.duckdns.org || true
